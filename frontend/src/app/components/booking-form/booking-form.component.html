<div class="booking-container">
  <div class="header">
    <h2>Reserve Slot</h2>
    <p>Please fill out the details below</p>
  </div>

  <div *ngIf="error" class="error-msg">{{ error }}</div>
  <div *ngIf="success" class="success-msg">{{ success }}</div>

  <form [formGroup]="bookingForm" (ngSubmit)="onSubmit()" class="booking-form">
    <div class="form-group">
      <label for="date">Date</label>
      <input type="date" id="date" formControlName="date" required>
      <div class="validation-error" *ngIf="bookingForm.get('date')?.invalid && bookingForm.get('date')?.touched">
        Date is required.
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label for="startTime">Start Time</label>
        <input type="time" id="startTime" formControlName="startTime" required>
        <div class="validation-error" *ngIf="bookingForm.get('startTime')?.invalid && bookingForm.get('startTime')?.touched">
          Start Time is required.
        </div>
      </div>
      
      <div class="form-group">
        <label for="endTime">End Time</label>
        <input type="time" id="endTime" formControlName="endTime" required>
        <div class="validation-error" *ngIf="bookingForm.get('endTime')?.invalid && bookingForm.get('endTime')?.touched">
          End Time is required.
        </div>
      </div>
    </div>

    <div class="form-actions">
      <button type="button" class="cancel-btn" routerLink="/">Cancel</button>
      <button type="submit" class="submit-btn" [disabled]="bookingForm.invalid || submitting">
        {{ submitting ? 'Processing...' : 'Confirm Reservation' }}
      </button>
    </div>
  </form>
</div>
